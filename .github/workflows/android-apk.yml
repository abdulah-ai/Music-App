# Builds the Duskglen Android APK in the cloud (this repo's dev machine has no
# Android SDK) and publishes it to a rolling GitHub Release, so the download
# link never changes:
#   https://github.com/3boodabbas2026-debug/Music-App/releases/tag/apk-latest
#
# Signing: the ANDROID_SIGNING_BUNDLE_B64 secret is a base64 tar.gz holding
# both the PKCS12 keystore and its password (generated 2026-07-09, lives
# locally in the gitignored frontend/signing/ — single secret so a partial
# paste can't desync keystore and password). With it, builds are
# release-signed with a stable key and newer builds install straight over
# older ones. Without it, the build falls back to a debug-signed APK — fully
# functional, but each build signs with a fresh key, so updating means
# uninstall + reinstall.
name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write # create/update the apk-latest release

concurrency:
  group: android-apk
  cancel-in-progress: true

jobs:
  quality:
    name: TypeScript quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build production web bundle
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_BASE_URL: http://127.0.0.1:4173
        run: npm run build:web

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Mobile login and dashboard smoke
        working-directory: frontend
        run: npm run test:smoke

  apk:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build web bundle (pointed at the live API)
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_BASE_URL: https://supermediaapp-api.onrender.com
          # Baked into the APK's JS bundle so the running app can compare
          # itself against version.json below and offer an in-app update.
          EXPO_PUBLIC_APP_VERSION_CODE: ${{ github.run_number }}
        run: npm run build:web

      - name: Sync Capacitor Android project
        working-directory: frontend
        run: npx cap sync android

      - name: Unpack signing bundle (skipped if secret unset)
        env:
          BUNDLE_B64: ${{ secrets.ANDROID_SIGNING_BUNDLE_B64 }}
        run: |
          if [ -z "$BUNDLE_B64" ]; then
            echo "No signing secret — building a debug-signed APK."
            exit 0
          fi
          mkdir -p signing
          if ! echo "$BUNDLE_B64" | base64 -d > signing/bundle.tgz; then
            echo "::error title=Signing::ANDROID_SIGNING_BUNDLE_B64 is not valid base64 — re-paste it from frontend/signing/signing-bundle-base64.txt"
            exit 1
          fi
          tar xzf signing/bundle.tgz -C signing
          mv signing/duskglen-release.p12 frontend/android/duskglen-release.p12
          mv signing/keystore-password.txt frontend/android/keystore-password.txt
          # Prove Java itself can open the keystore with this password before
          # spending minutes in Gradle — fail loudly and publicly if not.
          if ! keytool -list -storetype pkcs12 \
              -keystore frontend/android/duskglen-release.p12 \
              -storepass "$(cat frontend/android/keystore-password.txt)" > /dev/null; then
            echo "::error title=Signing::keytool could not open the keystore with the bundled password — regenerate the bundle and re-paste the secret"
            exit 1
          fi
          echo "Keystore verified with keytool — building a release-signed APK."

      - name: Build APK
        working-directory: frontend/android
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: |
          chmod +x gradlew
          set -o pipefail
          if [ -f duskglen-release.p12 ]; then
            export ANDROID_KEYSTORE_FILE="$PWD/duskglen-release.p12"
            export ANDROID_KEYSTORE_PASSWORD="$(cat keystore-password.txt)"
            TARGET=assembleRelease; OUT=release/app-release.apk
          else
            TARGET=assembleDebug; OUT=debug/app-debug.apk
          fi
          # Surface Gradle failures as annotations — full logs are login-gated
          # on github.com, annotations are readable via the public checks API.
          if ! ./gradlew "$TARGET" --no-daemon 2>&1 | tee gradle-build.log; then
            grep -A 10 "What went wrong" gradle-build.log | head -12 \
              | while IFS= read -r line; do [ -n "$line" ] && echo "::error title=Gradle::${line}"; done
            grep -E "^e: |error:|Caused by" gradle-build.log | head -8 \
              | while IFS= read -r line; do echo "::error title=Gradle detail::${line}"; done
            exit 1
          fi
          cp "app/build/outputs/apk/$OUT" "$GITHUB_WORKSPACE/duskglen.apk"

      - name: Write version.json (lets installed apps detect this release)
        run: |
          cat > version.json <<EOF
          {
            "versionCode": ${{ github.run_number }},
            "apkUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/download/apk-latest/duskglen.apk"
          }
          EOF

      - name: Publish to the rolling apk-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete apk-latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          gh release create apk-latest duskglen.apk version.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "Duskglen APK (latest)" \
            --notes "Automatic Android build of commit ${GITHUB_SHA::7} — download duskglen.apk below, open it on your phone, and allow the install. Already have the app? It will offer this update in-app within about 30 minutes."
