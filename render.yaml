services:
  - type: web
    name: supermediaapp-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pinned because shazamio-core (song recognition) only ships prebuilt
      # wheels up to cp313 — on 3.14 pip falls back to a Rust/Cargo source
      # build that fails in Render's read-only build sandbox.
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: SMA_SECRET_KEY
        generateValue: true
      # SMA_MEDIA_STORAGE_DIR is only ever local *scratch* space now (yt-dlp
      # always downloads here first, even in S3 mode, before the finished
      # file is adopted into permanent storage) — the free plan has no
      # persistent Disk, so /var/data doesn't exist; this path under the
      # app's own writable project directory always does.
      - key: SMA_MEDIA_STORAGE_DIR
        value: /opt/render/project/src/backend/data/media_storage
      # sync: false so a future blueprint sync never overwrites whatever you
      # paste here on the dashboard. Left blank/default: SQLite on local
      # ephemeral disk (resets on every redeploy — same as any free-tier
      # service). For real persistence, paste a managed Postgres connection
      # string (e.g. from Neon's free tier) as the value on the dashboard —
      # postgresql:// is normalized to the asyncpg driver automatically.
      - key: SMA_DATABASE_URL
        sync: false
      # "local" (default, unset) keeps downloaded files on this instance's
      # disk — wiped on every redeploy. Set to "s3" plus the S3_* vars below
      # (any S3-compatible bucket — Backblaze B2's free tier needs no card
      # for private buckets; Cloudflare R2 also works but currently gates
      # signup behind adding a payment method) for files that survive
      # redeploys and stream directly from the bucket at no/low egress cost.
      - key: SMA_STORAGE_BACKEND
        sync: false
      - key: SMA_S3_ENDPOINT_URL
        sync: false
      # Only needed for providers (like Backblaze B2) whose signing requires
      # the real region rather than R2's "auto" default — e.g. "us-west-004".
      - key: SMA_S3_REGION
        sync: false
      - key: SMA_S3_ACCESS_KEY_ID
        sync: false
      - key: SMA_S3_SECRET_ACCESS_KEY
        sync: false
      - key: SMA_S3_BUCKET
        sync: false
      - key: SMA_CORS_ORIGINS
        value: '["*"]'
      - key: SMA_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: SMA_MAX_CONCURRENT_DOWNLOADS
        value: "1"
      - key: SMA_RECOGNITION_TIMEOUT_SECONDS
        value: "25"
      - key: SMA_YTDLP_IMPERSONATE
        value: chrome
      - key: SMA_YTDLP_COOKIES_TEXT
        sync: false
      - key: SMA_YTDLP_COOKIES_B64
        sync: false
      - key: SMA_YTDLP_PROXY_URL
        sync: false
      # Optional but recommended for a public demo. If set, registration
      # requires clients to send this invite code.
      - key: SMA_REGISTRATION_INVITE_CODE
        sync: false
      # Unset by default (nobody is admin). Set this to your own account's
      # real email on the dashboard to unlock the in-app Admin dashboard for
      # that account only — sync: false so a future blueprint sync never
      # overwrites it.
      - key: SMA_ADMIN_EMAIL
        sync: false

  - type: web
    name: supermediaapp-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build:web
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # After the API deploys, set this to:
      # https://supermediaapp-api.onrender.com
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false
      # Set to "true" if you also set SMA_REGISTRATION_INVITE_CODE above.
      - key: EXPO_PUBLIC_REGISTRATION_INVITE_REQUIRED
        value: "false"
